# Define a job named 'pages'
pages:
  # Use a lightweight base image (alpine is often used for simple tasks)
  image: alpine:latest
  # Specify which Git branches will trigger the deployment
  # 'master' is common, but change this if your default branch is 'main'
  only:
    - main
  # This stage is for deployment
  stage: deploy
  # The script defines the steps to deploy
  script:
    # 1. Create a directory named 'public'
    - mkdir .public
    # 2. Move everything from your repository root into the 'public' directory
    #    The 'public' directory is where GitLab Pages looks for the site content
    - cp -r * .public
    # 3. Remove the temporary public directory
    - rm -rf public
    # 4. Rename the temporary directory to the required 'public'
    - mv .public public
  # Define the artifacts (files/directories) that the job produces
  artifacts:
    paths:
      # This is critical: GitLab Pages expects the site content to be 
      # located inside a directory named 'public'
      - public
      