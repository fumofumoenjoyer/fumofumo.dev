pages:
  # This tells GitLab CI this is a Pages deployment job
  stage: deploy

  # The script that runs to build/prepare the site
  script:
    # Create the public directory
    - mkdir .public
    # Copy all files from the project root into the temporary directory
    - cp -r * .public
    # Rename the temporary directory to 'public'
    - mv .public public 

  # Artifacts are the files the CI job produces and saves
  artifacts:
    paths:
      # This specifies the 'public' folder will be uploaded for Pages
      - public

  # Only deploy when changes are pushed to the 'main' branch
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH